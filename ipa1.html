<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss IPA - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-amber-500 mb-8 uppercase tracking-tighter">Boss Panel</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <!-- Form -->
            <div class="bg-slate-900 p-6 rounded-3xl border border-white/10 shadow-xl h-fit">
                <h2 class="text-xl font-bold mb-4">Add New App</h2>
                <div class="space-y-4">
                    <input id="title" placeholder="App Name (e.g. YouTube Premium)" class="w-full bg-slate-800 border-none p-3 rounded-xl">
                    <input id="tag" placeholder="Tag (e.g. NO ADS / MOD)" class="w-full bg-slate-800 border-none p-3 rounded-xl">
                    <input id="desc" placeholder="Short Description" class="w-full bg-slate-800 border-none p-3 rounded-xl">
                    <input id="img" placeholder="Icon Image URL" class="w-full bg-slate-800 border-none p-3 rounded-xl">
                    <input id="url" placeholder="IPA File URL" class="w-full bg-slate-800 border-none p-3 rounded-xl">
                    <button onclick="addApp()" id="btn-text" class="w-full bg-amber-500 hover:bg-amber-600 p-4 rounded-xl font-black uppercase transition">Upload to Store</button>
                </div>
            </div>

            <!-- List -->
            <div class="bg-slate-900 p-6 rounded-3xl border border-white/10 shadow-xl">
                <h2 class="text-xl font-bold mb-4">Manage Apps</h2>
                <div id="manage-list" class="space-y-3">
                    <!-- Dynamic list will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://ipa-boss.onrender.com";

        async function loadManageList() {
            const list = document.getElementById('manage-list');
            list.innerHTML = `<p class="text-gray-500">Loading...</p>`;
            
            const response = await fetch(`${API_URL}/apps`);
            const apps = await response.json();

            list.innerHTML = apps.map(app => `
                <div class="flex items-center justify-between bg-slate-800 p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${app.image}" class="w-10 h-10 rounded-lg object-cover">
                        <span class="font-bold text-sm truncate w-24">${app.title}</span>
                    </div>
                    <button onclick="deleteApp('${app.id}')" class="text-red-500 hover:bg-red-500/10 px-3 py-1 rounded-lg text-xs font-bold transition">DELETE</button>
                </div>
            `).join('');
        }

        async function addApp() {
            const btn = document.getElementById('btn-text');
            const data = {
                title: document.getElementById('title').value,
                tag: document.getElementById('tag').value,
                description: document.getElementById('desc').value,
                image: document.getElementById('img').value,
                download_url: document.getElementById('url').value
            };

            if(!data.title || !data.download_url) return alert("Title and URL are required!");

            btn.innerText = "Uploading...";
            
            const response = await fetch(`${API_URL}/apps`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("App added successfully!");
                location.reload();
            } else {
                alert("Error adding app.");
                btn.innerText = "Upload to Store";
            }
        }

        async function deleteApp(id) {
            if(!confirm("Are you sure?")) return;
            const response = await fetch(`${API_URL}/apps/${id}`, { method: 'DELETE' });
            if(response.ok) loadManageList();
        }

        loadManageList();
    </script>
</body>
</html>
